# /etc/nginx/sites-available/videobot.conf
# Reverse proxy for the multi-tenant Telegram Web Manager (web_app.py on :8080).
#
# No nginx Basic-Auth gate: the premium in-app login (Account / Operator) is the
# front door. Anti-abuse for the OTP endpoint is handled in-app (per-IP rate
# limit on /api/auth/send_code), so there is no ugly browser auth popup.

# HTTP -> HTTPS (and ACME challenge passthrough for certbot renewals)
server {
    listen 80;
    server_name login.mlbbshop.app;

    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name login.mlbbshop.app;

    ssl_certificate     /etc/letsencrypt/live/login.mlbbshop.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/login.mlbbshop.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket (live message updates on /ws)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}
